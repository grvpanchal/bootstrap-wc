name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc -b
      - name: Build every package
        run: npm run build
      - name: CLI smoke test
        run: |
          mkdir -p /tmp/bwc-test
          cd /tmp/bwc-test
          BWC_REGISTRY_URL=file://$GITHUB_WORKSPACE/apps/docs/public/r node $GITHUB_WORKSPACE/packages/cli/bin/bwc.js init -y
          BWC_REGISTRY_URL=file://$GITHUB_WORKSPACE/apps/docs/public/r node $GITHUB_WORKSPACE/packages/cli/bin/bwc.js add button alert modal -y
          test -f src/components/ui/button/button.ts
          test -f src/components/ui/core/bootstrap-element.ts

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build core
        run: npm run build --workspace @bootstrap-wc/core
      - name: Build components
        run: npm run build --workspace @bootstrap-wc/components
      - name: Build plugin packages
        # plugin smoke tests in packages/components/test/plugins.test.ts
        # import @bootstrap-wc/plugin-*/define — those need dist/ built first.
        run: |
          for pkg in packages/plugin-*/; do
            name=$(node -p "require('./$pkg/package.json').name")
            npm run build --workspace "$name"
          done
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run component tests
        run: npm run test --workspace @bootstrap-wc/components
